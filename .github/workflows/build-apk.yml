name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Unpack Android project
        run: unzip -q MadinaMushafAnnotator-v0.2.1-cloud-build.zip

      - name: Install Android SDK 35
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Build debug APK
        working-directory: MadinaMushafAnnotator
        run: gradle --no-daemon --stacktrace :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Madina-Mushaf-APK
          path: MadinaMushafAnnotator/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
